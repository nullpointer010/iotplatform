networks:
  iot-net:
    driver: bridge
    external: true

services:
  iot-api:
    container_name: iot-api
    build:
      context: ../api
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONUNBUFFERED=1
      - ORION_URL=http://orion:1026
      - QUANTUMLEAP_URL=http://quantumleap:8668
      - FIWARE_SERVICE=${FIWARE_SERVICE:-iot}
      - FIWARE_SERVICEPATH=${FIWARE_SERVICEPATH:-/}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER:-http://localhost:8081/realms/iot-platform}
      - KEYCLOAK_JWKS_URL=${KEYCLOAK_JWKS_URL:-http://keycloak:8080/realms/iot-platform/protocol/openid-connect/certs}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-iot-web}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
    volumes:
      - ../api/app:/app/app
      - ../api/alembic:/app/alembic
      - ../api/alembic.ini:/app/alembic.ini
      - ../api/tests:/app/tests
      - ../api/pytest.ini:/app/pytest.ini
      - iot_manuals:/var/lib/iot/manuals
    expose:
      - "8000"
    depends_on:
      - orion
      - quantumleap
      - postgres
      - keycloak
    networks:
      - iot-net
