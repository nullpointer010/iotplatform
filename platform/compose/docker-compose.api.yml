networks:
  iot-net:
    driver: bridge
    external: true

services:
  iot-api:
    container_name: iot-api
    build:
      context: ../api
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - ORION_URL=http://orion:1026
      - QUANTUMLEAP_URL=http://quantumleap:8668
      - FIWARE_SERVICE=${FIWARE_SERVICE:-iot}
      - FIWARE_SERVICEPATH=${FIWARE_SERVICEPATH:-/}
    volumes:
      - ../api/app:/app/app
      - ../api/tests:/app/tests
      - ../api/pytest.ini:/app/pytest.ini
    ports:
      - "${API_PORT}:8000"
    depends_on:
      - orion
      - quantumleap
    networks:
      - iot-net
