networks:
  iot-net:
    driver: bridge
    external: true

volumes:
  cratedb_data:
  mongo_data:
  postgres_data:
  keycloak_db_data:

services:
  cratedb:
    image: crate:6.2.6
    container_name: cratedb
    restart: unless-stopped
    environment:
      - CRATE_HEAP_SIZE=${CRATE_HEAP_SIZE:-2g}
    command: >
      crate
      -Cnetwork.host=0.0.0.0
      -Cdiscovery.type=single-node
      -Ccluster.name=iot-cluster
      -Chttp.cors.enabled=true
      -Chttp.cors.allow-origin="*"
      -Cauth.host_based.enabled=false
    ports:
      - "${ADMIN_UI_PORT}:4200"
      - "${CRATEDB_PORT}:5432"
    volumes:
      - cratedb_data:/data
      - ../config/cratedb:/opt/crate/config
    networks:
      - iot-net

  postgres:
    image: postgres:17.9
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iot-net

  mongo:
    image: mongo:8.2.7
    container_name: mongo
    hostname: mongo-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - iot-net

  orion:
    image: fiware/orion:4.4.0
    container_name: orion
    restart: unless-stopped
    depends_on:
      - mongo
    command: -dbURI mongodb://mongo-db:27017 -logLevel INFO
    ports:
      - "1026:1026"
    networks:
      - iot-net
    healthcheck:
      test: curl --fail -s http://localhost:1026/version || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  quantumleap:
    image: orchestracities/quantumleap:1.0.0
    container_name: quantumleap
    hostname: quantumleap
    restart: unless-stopped
    depends_on:
      - orion
      - cratedb
    environment:
      - CRATE_HOST=${CRATE_HOST}
      - CRATE_PORT=${CRATE_PORT}
      - LOGLEVEL=${LOGLEVEL}
      - USE_GEOCODING=${USE_GEOCODING}
      - CACHE_QUERIES=${CACHE_QUERIES}
      - WQ_MAX_RETRIES=${WQ_MAX_RETRIES}
    ports:
      - "8668:8668"
    networks:
      - iot-net
    healthcheck:
      test: curl --fail -s http://localhost:8668/version || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Keycloak (ticket 0013) ────────────────────────────────────────
  keycloak-db:
    image: postgres:17-alpine
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - iot-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: keycloak
    command: start-dev --import-realm
    restart: unless-stopped
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME_URL: http://localhost:${KEYCLOAK_HTTP_PORT}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:${KEYCLOAK_HTTP_PORT}:8080"
    volumes:
      - ../config/keycloak:/opt/keycloak/data/import:ro
    networks:
      - iot-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /realms/master HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200\\|302'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_healthy
      iot-api:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://localhost:${KEYCLOAK_HTTP_PORT}/realms/iot-platform
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_LOGIN_URL: http://localhost:${KEYCLOAK_HTTP_PORT}/realms/iot-platform/protocol/openid-connect/auth
      OAUTH2_PROXY_REDEEM_URL: http://keycloak:8080/realms/iot-platform/protocol/openid-connect/token
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/realms/iot-platform/protocol/openid-connect/certs
      # Keycloak puts the client id in `azp`, not `aud`. Read that claim instead.
      OAUTH2_PROXY_OIDC_AUDIENCE_CLAIMS: azp
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_REDIRECT_URL: http://localhost/oauth2/callback
      # `/api/` first so it longest-prefix-wins over `/`. The API container has no host port.
      OAUTH2_PROXY_UPSTREAMS: "http://iot-api:8000/api/,http://host.docker.internal:3000/"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      # On /oauth2/sign_out, also call Keycloak's end_session endpoint so the
      # SSO cookie is killed too — otherwise Keycloak silently re-issues a
      # session on the next request and "logout" appears to do nothing.
      OAUTH2_PROXY_BACKEND_LOGOUT_URL: "http://localhost:${KEYCLOAK_HTTP_PORT}/realms/iot-platform/protocol/openid-connect/logout?id_token_hint={id_token}"
    ports:
      - "127.0.0.1:${WEB_PORT}:4180"
    networks:
      - iot-net
