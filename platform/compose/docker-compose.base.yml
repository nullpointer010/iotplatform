networks:
  iot-net:
    driver: bridge
    external: true

volumes:
  cratedb_data:
  mongo_data:
  postgres_data:

services:
  cratedb:
    image: crate:6.2.6
    container_name: cratedb
    restart: unless-stopped
    environment:
      - CRATE_HEAP_SIZE=${CRATE_HEAP_SIZE:-2g}
    command: >
      crate
      -Cnetwork.host=0.0.0.0
      -Cdiscovery.type=single-node
      -Ccluster.name=iot-cluster
      -Chttp.cors.enabled=true
      -Chttp.cors.allow-origin="*"
      -Cauth.host_based.enabled=false
    ports:
      - "${ADMIN_UI_PORT}:4200"
      - "${CRATEDB_PORT}:5432"
    volumes:
      - cratedb_data:/data
      - ../config/cratedb:/opt/crate/config
    networks:
      - iot-net

  postgres:
    image: postgres:17.9
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iot-net

  mongo:
    image: mongo:8.2.7
    container_name: mongo
    hostname: mongo-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - iot-net

  orion:
    image: fiware/orion:4.4.0
    container_name: orion
    restart: unless-stopped
    depends_on:
      - mongo
    command: -dbURI mongodb://mongo-db:27017 -logLevel INFO
    ports:
      - "1026:1026"
    networks:
      - iot-net
    healthcheck:
      test: curl --fail -s http://localhost:1026/version || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  quantumleap:
    image: orchestracities/quantumleap:1.0.0
    container_name: quantumleap
    hostname: quantumleap
    restart: unless-stopped
    depends_on:
      - orion
      - cratedb
    environment:
      - CRATE_HOST=${CRATE_HOST}
      - CRATE_PORT=${CRATE_PORT}
      - LOGLEVEL=${LOGLEVEL}
      - USE_GEOCODING=${USE_GEOCODING}
      - CACHE_QUERIES=${CACHE_QUERIES}
      - WQ_MAX_RETRIES=${WQ_MAX_RETRIES}
    ports:
      - "8668:8668"
    networks:
      - iot-net
    healthcheck:
      test: curl --fail -s http://localhost:8668/version || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
