# Mosquitto v2 broker config — IoT Platform (ticket 0018).
# Dev profile: plaintext, password-file auth, no anonymous, persistence on.
# TLS / per-device ACLs are deferred (see ticket 0018 design.md § Out of scope).

listener 1883 0.0.0.0
protocol mqtt

allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
